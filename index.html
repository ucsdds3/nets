    <!-- Theme before paint; key must match src/theme/constants.ts (THEME_STORAGE_KEY) -->
    <script>
      (function () {
        try {
          var k = "nets-theme-preference";
          var p = localStorage.getItem(k);
          var root = document.documentElement;
          if (p === "light") root.setAttribute("data-theme", "light");
          else if (p === "dark") root.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
